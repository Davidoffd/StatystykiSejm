name: Aktualizacja konferencji

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Zainstaluj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Zainstaluj zależności
        run: npm install

      - name: Zainstaluj Playwright
        run: npx playwright install --with-deps

      - name: Uruchom skrypt
        run: node scripts/update.js

      - name: Zapisz zmiany do repozytorium
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/konferencje.json
          git diff --cached --quiet || git commit -m "Automatyczna aktualizacja konferencji"
          git push
